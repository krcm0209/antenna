name: Sync FCC Data

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

env:
  BUCKET: ${{ secrets.GCP_FCC_DB_BUCKET }}

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install SpatiaLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - name: Download previous DB
        run: gcloud storage cp gs://${{ env.BUCKET }}/fcc.db fcc.db || echo "No previous DB found — starting fresh"

      - name: Run sync
        run: uv run python -m antenna.sync --skip-am-fetch

      - name: Upload DB to GCS
        run: gcloud storage cp fcc.db gs://${{ env.BUCKET }}/fcc.db
