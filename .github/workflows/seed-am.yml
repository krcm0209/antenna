name: Seed AM Contours

on:
  workflow_dispatch:

env:
  BUCKET: ${{ secrets.GCP_FCC_DB_BUCKET }}

permissions:
  contents: read
  id-token: write

jobs:
  build-base:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install SpatiaLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - name: Build base DB (skip AM contour fetch)
        run: uv run python -m antenna.sync --skip-am-fetch

      - name: Upload base DB
        run: gcloud storage cp fcc.db gs://${{ env.BUCKET }}/fcc.db

  seed:
    needs: build-base
    runs-on: ubuntu-latest
    timeout-minutes: 330
    strategy:
      fail-fast: false
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install SpatiaLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - name: Download base DB
        run: gcloud storage cp gs://${{ env.BUCKET }}/fcc.db fcc.db

      - name: Fetch AM contour batch ${{ matrix.batch }}
        env:
          BATCH_SIZE: "1800"
        run: |
          OFFSET=$(( ${{ matrix.batch }} * $BATCH_SIZE ))
          uv run python -m antenna.sync.am_seed --offset $OFFSET --limit $BATCH_SIZE

      - name: Upload batch DB
        run: gcloud storage cp fcc.db gs://${{ env.BUCKET }}/fcc-batch-${{ matrix.batch }}.db

  merge:
    needs: seed
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install SpatiaLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-mod-spatialite

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - name: Download base and batch DBs
        run: |
          gcloud storage cp gs://${{ env.BUCKET }}/fcc.db fcc.db
          for i in 0 1 2 3 4 5 6; do
            gcloud storage cp gs://${{ env.BUCKET }}/fcc-batch-$i.db fcc-batch-$i.db
          done

      - name: Merge batches
        run: uv run python -m antenna.sync.am_merge --batches 7

      - name: Upload final DB
        run: gcloud storage cp fcc.db gs://${{ env.BUCKET }}/fcc.db
