name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGION: us-east1
  SERVICE: antenna
  IMAGE: us-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/antenna/antenna

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Download fcc.db from GCS
        run: gcloud storage cp gs://${{ secrets.GCP_FCC_DB_BUCKET }}/fcc.db fcc.db

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build --target production -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
